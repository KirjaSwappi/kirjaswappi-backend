spring:
  web:
    resources:
      add-mappings: false
  profiles:
    active: local
  application:
    name: KirjaSwappi-Backend
  messages:
    basename: messages.messages
    fallback-to-system-locale: false
    encoding: UTF-8
  servlet:
    multipart:
      # Single image cap (book cover, profile/cover photo, chat attachment)
      max-file-size: 10MB
      # Total request cap allows up to ~5 cover photos in a single book
      # creation multipart request.
      max-request-size: 50MB

  mail:
    host: ${EMAIL_HOST}
    port: ${EMAIL_PORT}
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    from-email: ${EMAIL_FROM}
    properties:
      mail:
        debug: false
        default:
          encoding: UTF-8
        smtp:
          from: ${EMAIL_USERNAME}
          auth: true
          starttls:
            enable: true
            required: true
          ssl:
            trust: ${EMAIL_HOST}
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
  threads:
    virtual:
      enabled: true

  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_AMQP_PORT:5672}
    stomp-port: ${RABBITMQ_STOMP_PORT:61613}
    username: ${RABBITMQ_USERNAME:guest}
    password: ${RABBITMQ_PASSWORD:guest}

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000


resilience4j.retry:
  instances:
    globalRetry:
      maxAttempts: 3
      waitDuration: 1000
      retryExceptions:
        - java.net.SocketTimeoutException
        - java.net.ConnectException
        - org.springframework.dao.OptimisticLockingFailureException
        - org.springframework.web.client.HttpServerErrorException
        - org.springframework.mail.MailSendException

logging:
  level:
    org:
      springframework:
        security: INFO

google:
  api:
    clientId: 43921547457-06chtojpprgds80g1gq5tprmn5qg0hmq.apps.googleusercontent.com

notification:
  service:
    host: ${NOTIFICATION_SERVICE_HOST:notify.kirjaswappi.fi}
    port: ${NOTIFICATION_SERVICE_PORT:50051}
    enabled: ${NOTIFICATION_SERVICE_ENABLED:true}
    apiKey: ${NOTIFICATION_API_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus
  endpoint:
    health:
      show-details: when_authorized