name: Main Pipeline

on:
  push:
    branches:
      - main

jobs:
  publish_and_release:
    runs-on: ubuntu-latest
    container: maven:3-sapmachine-25
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Maven cache
        uses: actions/cache@v4
        with:
          path: /root/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build, run tests, deploy
        run: mvn -B deploy -s .github/mvn/settings.xml
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set Version for Release
        run: echo "VERSION=0.0.${{ github.run_number }}" >> $GITHUB_ENV

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: Release v${{ env.VERSION }}
          draft: false
          prerelease: false

  docker:
    runs-on: ubuntu-latest
    needs: publish_and_release
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/kirjaswappi/kirjaswappi-backend:latest
            ghcr.io/kirjaswappi/kirjaswappi-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max